<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>親子字母「聲」學堂</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- 全局樣式 --- */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }
        
        body {
            font-family: "Comic Neue", "Comic Sans MS", "Chalkboard SE", "PingFang HK", "Microsoft JhengHei", sans-serif;
            background-color: #E0F7FA;
            margin: 0; padding: 0;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            overscroll-behavior: none;
        }

        button, input, textarea {
            font-family: "Comic Neue", "Comic Sans MS", "Chalkboard SE", "PingFang HK", sans-serif;
        }

        .card {
            background-color: white; 
            width: 100%; max-width: 600px; 
            height: 100dvh; 
            padding: 10px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center; 
            position: relative;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
        }

        @media (min-width: 600px) {
            .card {
                height: 95dvh;
                width: 95vw;
                border-radius: 30px;
                border: 6px solid #4DD0E1;
                justify-content: center; 
                padding: 15px;
            }
        }
        
        .hidden { display: none !important; }

        h1 { color: #00838F; margin: 5px 0; font-size: clamp(1.5rem, 4vh, 2.2rem); }
        h2 { color: #FF7043; margin: 5px 0; font-size: clamp(1.2rem, 3vh, 1.8rem); }
        p { font-size: clamp(1rem, 2.5vh, 1.3rem); color: #555; margin: 10px 0; line-height: 1.4; }

        /* ========================================= */
        /* 動畫設定 */
        /* ========================================= */
        .btn-primary, .menu-btn, .rev-card, .skip-btn, .back-btn, 
        .sound-btn-big, .sound-btn-small, .choice-card, .training-btn, .btn-challenge {
            transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-primary:active, .menu-btn:active, .rev-card:active, 
        .skip-btn:active, .back-btn:active, .sound-btn-big:active, 
        .sound-btn-small:active, .choice-card:active, .training-btn:active, 
        .btn-challenge:active {
            transform: scale(0.92) !important;
        }

        .active-anim {
            transform: scale(0.92) !important;
            filter: brightness(0.95);
        }

        /* --- 按鈕樣式 --- */
        .btn-primary {
            background: linear-gradient(135deg, #26A69A, #00897B);
            color: white; border: none; 
            padding: 15px 0; width: 80%; 
            font-size: clamp(1.2rem, 3vh, 1.5rem); 
            border-radius: 50px; 
            box-shadow: 0 6px 0 #004D40; 
            margin-top: 10px;
            margin-bottom: 20px; 
        }
        .btn-primary:active, .btn-primary.active-anim { box-shadow: 0 3px 0 #004D40; }

        .menu-grid {
            display: grid; grid-template-columns: 1fr; gap: 12px;
            width: 100%; overflow-y: auto; max-height: 70vh; padding: 5px;
        }
        .menu-btn {
            background: white; border: 3px solid #00BCD4; color: #00838F;
            padding: 15px; border-radius: 15px;
            font-size: clamp(1rem, 2.5vh, 1.3rem); font-weight: bold;
            box-shadow: 0 4px 0 #0097A7;
        }
        .menu-btn:active, .menu-btn.active-anim { box-shadow: 0 2px 0 #0097A7; }

        .menu-btn.special { background: #FFF3E0; border-color: #FF9800; color: #E65100; box-shadow: 0 4px 0 #F57C00; }
        .menu-btn.special:active, .menu-btn.special.active-anim { box-shadow: 0 2px 0 #F57C00; }

        .menu-btn.locked { background: #ECEFF1; border-color: #CFD8DC; color: #B0BEC5; box-shadow: none; cursor: not-allowed; }
        .menu-btn.locked:active, .menu-btn.locked.active-anim { transform: none !important; }

        .revision-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            width: 100%; margin-bottom: 20px; overflow-y: auto; max-height: 60vh; padding: 5px;
        }
        .rev-card {
            background: #E1F5FE; border: 2px solid #4FC3F7; border-radius: 12px;
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.5rem, 4vh, 2rem); color: #0277BD;
            font-weight: bold;
        }
        .rev-card:active, .rev-card.active-anim { background-color: #B3E5FC; }

        .skip-btn {
            background: transparent; border: 2px solid #B0BEC5; color: #78909C;
            padding: 5px 15px; border-radius: 20px; font-size: 0.9em;
            position: absolute; top: 15px; right: 15px; z-index: 20;
        }
        .skip-btn:active, .skip-btn.active-anim { background-color: #ECEFF1; }

        .back-btn {
            position: absolute; top: 15px; left: 15px;
            width: 45px; height: 45px; border-radius: 50%;
            background-color: #ECEFF1; border: 2px solid #B0BEC5;
            color: #546E7A; font-size: 24px; display: flex; justify-content: center; align-items: center; z-index: 20; font-weight: bold;
        }
        .back-btn:active, .back-btn.active-anim { transform: scale(0.9) !important; }

        .top-bar {
            display: flex; justify-content: space-between; width: 100%;
            background: #E0F2F1; padding: 10px 15px; border-radius: 15px;
            color: #00695C; font-weight: bold; margin-bottom: 10px; 
            margin-top: 75px; 
        }

        .game-content-area {
            width: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            flex: 1;
            min-height: 20vh;
        }

        .audio-mode-container { display: none; }
        .sound-btn-big {
            width: 15vh; height: 15vh; max-width: 120px; max-height: 120px;
            background: linear-gradient(135deg, #FF7043, #D84315);
            border-radius: 50%; border: none; box-shadow: 0 8px 0 #BF360C;
            margin: 10px auto; display: flex; justify-content: center; align-items: center;
        }
        .sound-btn-big:active, .sound-btn-big.active-anim { box-shadow: 0 4px 0 #BF360C; }
        
        .question-mark { font-size: clamp(3rem, 6vh, 4rem); color: white; font-weight: bold; }

        .picture-mode-container { display: none; flex-direction: column; align-items: center; width: 100%; }
        .pic-row { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        
        .game-img {
            height: 15vh; 
            width: auto; max-width: 70%; object-fit: contain;
            border: 3px solid #ccc; border-radius: 15px; background-color: #fff;
        }
        
        .sound-btn-small {
            width: 50px; height: 50px;
            background: #FFEB3B; border-radius: 50%; border: 3px solid #FBC02D;
            box-shadow: 0 4px 0 #F9A825; margin-left: 15px;
            display: inline-flex; justify-content: center; align-items: center; font-size: 24px;
        }
        .sound-btn-small:active, .sound-btn-small.active-anim { box-shadow: 0 2px 0 #F9A825; }
        
        .word-puzzle {
            font-size: clamp(2.5rem, 5vh, 3.5rem); 
            letter-spacing: 5px; color: #333; 
            margin: 5px 0; 
            font-weight: bold;
        }

        .pseudo-mode-container { display: none; flex-direction: column; align-items: center; width: 100%; }

        .playing { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .choices-area {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; 
            margin: 5px 0 10px 0; 
            min-height: 80px;
        }
        
        .choice-card {
            background: white; border: 3px solid #4DB6AC;
            width: 10vh; height: 10vh; max-width: 90px; max-height: 90px;
            border-radius: 15px;
            font-size: clamp(2rem, 4vh, 3rem); color: #00796B;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 0 #00695C; 
        }
        .choice-card:active, .choice-card.active-anim { box-shadow: 0 2px 0 #00695C; }

        .correct-bg { background-color: #C8E6C9 !important; border-color: #4CAF50 !important; color: #2E7D32 !important; box-shadow: 0 5px 0 #2E7D32 !important; }
        .wrong-shake { animation: shake 0.4s; background-color: #FFCDD2 !important; border-color: #F44336 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .feedback-area {
            min-height: 80px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .next-btn {
            background-color: #009688; color: white; border: none;
            padding: 12px 40px; font-size: 1.2em; border-radius: 50px;
            box-shadow: 0 5px 0 #004D40; display: none; margin-top: 5px;
        }
        .next-btn:active, .next-btn.active-anim { box-shadow: 0 2px 0 #004D40; }
        .next-btn.show { display: block; animation: popIn 0.3s; }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* --- 鼓勵彈窗 --- */
        #praise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 200;
            display: flex; justify-content: center; align-items: center;
        }
        .praise-content {
            background: white; padding: 30px 50px; border-radius: 30px;
            text-align: center; border: 6px solid #FFD700;
            animation: popInBounce 0.6s;
        }
        #praise-emoji { font-size: 80px; margin-bottom: 10px; }
        #praise-text { font-size: 2em; color: #FF6F00; font-weight: bold; }
        @keyframes popInBounce { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 熱身按鈕 */
        .training-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 20px 0; }
        .training-btn {
            background-color: #FFF9C4; border: 4px solid #FBC02D;
            width: 12vh; height: 12vh; border-radius: 20px;
            font-size: 3em; color: #F57F17;
            box-shadow: 0 6px 0 #F9A825;
            display: flex; justify-content: center; align-items: center;
        }
        .training-btn:active, .training-btn.active-anim { box-shadow: 0 3px 0 #F9A825; }

        .password-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; }
        .password-card {
            background: #FFFDE7; border: 3px dashed #FBC02D;
            padding: 15px 25px; border-radius: 15px;
            font-size: 2em; font-weight: bold; color: #E65100;
        }

        .btn-challenge {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white; border: none; padding: 12px 40px;
            font-size: 1.2em; border-radius: 50px; 
            box-shadow: 0 6px 0 #E65100; margin-top: 20px;
            font-family: inherit; font-weight: bold;
            animation: pulse 2s infinite;
        }
        .btn-challenge:active, .btn-challenge.active-anim { box-shadow: 0 2px 0 #E65100; }

        /* 大功告成圖片樣式 (已縮小並防止溢出) */
        .success-img {
            max-width: 60%;
            max-height: 35vh; /* 限制高度，確保不會頂出框外 */
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin: 15px auto;
            display: none; /* 預設隱藏 */
        }

    </style>
</head>
<body>

    <div id="screen-menu" class="card">
        <div style="font-size: 4em; margin-bottom: 5px;">🕵️</div>
        <h1>小小「聲」探</h1>
        <p>請選擇你的任務</p>
        
        <div class="menu-grid">
            <button class="menu-btn special" onclick="startRevision()">「聲」探任務大集匯</button>
            <button class="menu-btn" onclick="startMission1()">「聲」探任務一</button>
            <button class="menu-btn" onclick="startMission2()">「聲」探任務二</button>
            <button class="menu-btn" onclick="startMission3()">「聲」探任務三</button>
            <button class="menu-btn" onclick="startMission4()">「聲」探任務四</button>
            <button class="menu-btn" onclick="startMission5()">「聲」探任務五</button>
            <button class="menu-btn" onclick="startMission6()">「聲」探任務六</button>
            <button class="menu-btn" onclick="startMission7()">「聲」探任務七</button>
            <button class="menu-btn special" onclick="startMission8()" style="background: linear-gradient(135deg, #FFD54F, #FFB300); color: #BF360C; border-color: #FF8F00; box-shadow: 0 4px 0 #FF6F00;">「聲」探終極任務 🏆</button>
        </div>
    </div>

    <div id="screen-revision" class="card hidden">
        <button class="back-btn" onclick="goToMenu()" title="返回目錄">🏠</button>
        <h2 style="color:#F57C00;">「聲」探任務大集匯</h2>
        <p>點擊字母，溫習聲音 🔊</p>
        
        <div id="revision-container" class="revision-grid"></div>
        
        <button class="btn-primary" onclick="goToMenu()">完成溫習 👍</button>
    </div>

    <div id="screen-cover" class="card hidden">
        <button class="back-btn" onclick="goToMenu()" title="返回目錄">🏠</button>
        <div style="font-size: 4em; margin-bottom: 10px;">🎓</div>
        <h1>親子字母「聲」學堂</h1>
        <p>準備好耳朵，一起來挑戰！</p>
        <button class="btn-primary" onclick="goToTraining()">進入學堂 ▶️</button>
    </div>

    <div id="screen-training" class="card hidden">
        <button class="back-btn" onclick="goToMenu()" title="返回目錄">🏠</button>
        <h2 style="color:#009688;">👂 聽力練習室</h2>
        <div class="volume-hint">請調高音量 🔊</div>
        <p>點擊字母聽聽看</p>
        
        <div id="training-btns-container" class="training-row"></div>
        
        <button class="btn-primary" onclick="goToGame()">開始挑戰 🎮</button>
    </div>

    <div id="screen-review" class="card hidden">
        <button class="back-btn" onclick="goToMenu()" title="返回目錄">🏠</button>
        <h2 style="color:#FF7043;">🤔 我們再複習一次</h2>
        <p>不要急，重新聽清楚聲音</p>
        <div id="review-btns-container" class="training-row"></div>
        
        <button class="btn-primary" onclick="returnFromReview()">我明白了，繼續 💪</button>
    </div>

    <div id="screen-game" class="card hidden">
        <button class="back-btn" onclick="goToMenu()" title="返回目錄">🏠</button>
        <button class="skip-btn" onclick="skipQuestion()">跳過 ⏭️</button>

        <div class="top-bar">
            <span id="q-counter">第 1 題</span>
            <span>得分: <span id="tick-count">0</span> ✅</span>
        </div>
        
        <h1 style="font-size: 1.5em; margin: 10px 0;">小小「聲」探</h1>
        
        <div class="game-content-area">
            <div id="audio-mode" class="audio-mode-container">
                <button class="sound-btn-big" id="speakerBtnBig" onclick="playGameSound()">
                    <span class="question-mark">?</span>
                </button>
                <p style="color:#90A4AE; font-size:0.9em; margin-top:5px;">點擊問號聽聲音</p>
            </div>

            <div id="picture-mode" class="picture-mode-container">
                <div class="pic-row">
                    <img id="game-img" class="game-img" src="" alt="Picture">
                    <button class="sound-btn-small" id="speakerBtnSmall" onclick="playGameSound()">
                        <span>🔊</span>
                    </button>
                </div>
                <div id="word-puzzle" class="word-puzzle">_ _ _</div>
            </div>

            <div id="pseudo-mode" class="pseudo-mode-container">
                <button class="sound-btn-big" id="speakerBtnPseudo" onclick="playGameSound()" style="background: linear-gradient(135deg, #4FC3F7, #0288D1); box-shadow: 0 8px 0 #0277BD;">
                    <span class="question-mark">🔊</span>
                </button>
                <div id="pseudo-word-puzzle" class="word-puzzle" style="margin-top: 25px; font-size: clamp(3rem, 6vh, 4rem);">_ _ _</div>
            </div>
        </div>
        
        <div class="choices-area" id="choices-container"></div>
        
        <div class="feedback-area">
            <div id="feedback" style="height:30px; font-size:1.2em; font-weight:bold; color:#009688;"></div>
            <button class="next-btn" id="nextBtn" onclick="handleNextClick()">下一題 ➡️</button>
        </div>
    </div>

    <div id="screen-result" class="card hidden" style="justify-content: center; gap: 10px; overflow-y: auto;">
        <h1 id="result-title" style="color:#FF7043; margin-top: 20px;">任務完畢！</h1>
        <p id="result-desc" style="background:#E0F2F1; padding:15px; border-radius:15px; color:#00796B;">
            恭喜你，小「聲」探任務完畢！<br>
            你已取得密碼。<br>
            <span style="color:#D84315; font-weight:bold;">請將密碼抄寫在工作紙上。</span>
        </p>
        <img id="final-success-img" class="success-img" src="" alt="出色小聲探">
        <div class="password-container" id="dynamic-passwords"></div>
        <p style="font-size:1em; color:#888;">總得分： <span id="final-score"></span></p>
        <br>
        <button class="btn-primary" onclick="goToMenu()">返回目錄 🏠</button>
    </div>

    <div id="praise-overlay" class="hidden">
        <div class="praise-content">
            <div id="praise-emoji">🌟</div>
            <div id="praise-text">做得好！</div>
        </div>
    </div>

    <audio id="player" playsinline></audio>

    <script>
        const player = document.getElementById('player');
        
        const allScreens = ['screen-menu', 'screen-revision', 'screen-cover', 'screen-training', 'screen-review', 'screen-game', 'screen-result'];

        // 任務密碼庫
        const missionPasswords = {
            1: ["ant", "ink"],
            2: ["ball", "table", "net"],
            3: ["fox", "lip", "ox", "dog"],
            4: ["hat", "pig", "girl"],
            5: ["sun", "up", "key"],
            6: ["mum", "red", "jam"],
            7: ["cat", "egg", "web", "van"]
        };

        const poolAllLetters = ['a','i','b','t','n','f','l','o','d','h','p','g','s','u','k','m','r','j','c','e','w','v','x','y','z','qu'];
        const poolOldLetters = ['a','i','b','t','n','f','l','o','d','h','p','g','s','u','k','m','r','j','c','e','w','v'];

        // --- 防混淆機制 (Anti-Confusion Filter) ---
        function filterPool(pool, ans) {
            let filtered = pool.filter(l => l !== ans); // 確保干擾項不包含正確答案
            if (ans === 'b') filtered = filtered.filter(l => l !== 'd');
            if (ans === 'd') filtered = filtered.filter(l => l !== 'b');
            if (ans === 'c') filtered = filtered.filter(l => l !== 'k');
            if (ans === 'k') filtered = filtered.filter(l => l !== 'c');
            return filtered;
        }

        // 隨機抽干擾項小工具 (已整合防混淆機制)
        function getDistractors(ans, count) {
            let pool = filterPool(poolAllLetters, ans);
            pool.sort(() => 0.5 - Math.random());
            return pool.slice(0, count);
        }

        function hideAllScreens() {
            allScreens.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('praise-overlay').classList.add('hidden');
        }

        function goToMenu() {
            hideAllScreens();
            document.getElementById('screen-menu').classList.remove('hidden');
            player.pause();
        }

        function startRevision() {
            hideAllScreens();
            document.getElementById('screen-revision').classList.remove('hidden');
            const container = document.getElementById('revision-container');
            if (container.innerHTML.trim() === "") {
                poolAllLetters.forEach(letter => {
                    const btn = document.createElement('div');
                    btn.className = 'rev-card';
                    btn.innerText = letter;
                    btn.onclick = (e) => playRevisionSound(letter);
                    container.appendChild(btn);
                });
            }
        }

        function playRevisionSound(letter) {
            player.src = "audio_overview/" + letter + ".mp3";
            player.play().catch(e => { console.log("No audio found"); });
        }

        // ==========================================
        //  遊戲核心邏輯
        // ==========================================
        
        let currentMission = 1; 
        let currentQuestionNum = 0;
        let ticks = 0;
        let isRoundActive = true;
        let q1Wrong = false;
        let q2Wrong = false;
        let nextPraiseThreshold = 0; 
        
        let currentTargetSound = ""; 
        let currentPicData = null;   

        let audioBagTask1 = [], audioBagTask2 = [], audioBagTask3 = [], audioBagTask4 = [];
        let audioBagTask5 = [], audioBagTask6 = [], audioBagTask7 = [];
        let audioBagFinal_Part1 = [], audioBagFinal_Part2 = [];

        // --- Task 1 Data ---
        const task1InitialData = [
            { word: "apple", display: "_ p p l e", ans: "a", img: "task1/apple.jpg" },
            { word: "ant",   display: "_ n t",     ans: "a", img: "task1/ant.jpg" },
            { word: "arm",   display: "_ r m",     ans: "a", img: "task1/arm.jpg" },
            { word: "ink",   display: "_ n k",     ans: "i", img: "task1/ink.jpg" },
            { word: "igloo", display: "_ g l o o", ans: "i", img: "task1/igloo.jpg" },
            { word: "it",    display: "_ t",       ans: "i", img: "task1/it.jpg" }
        ];
        const task1MiddleData = [
            { word: "hand", display: "h _ n d", ans: "a", img: "task1/hand.jpg" },
            { word: "cat",  display: "c _ t",   ans: "a", img: "task1/cat.jpg" },

        // ================= UI Helpers =================
        function setupAudioUI() {
            document.getElementById('audio-mode').style.display = 'block';
            document.getElementById('picture-mode').style.display = 'none';
            document.getElementById('pseudo-mode').style.display = 'none';
        }

        function setupPictureUI(data) {
            document.getElementById('audio-mode').style.display = 'none';
            document.getElementById('pseudo-mode').style.display = 'none';
            document.getElementById('picture-mode').style.display = 'flex';
            currentPicData = data;
            document.getElementById('game-img').src = currentPicData.img;
            document.getElementById('word-puzzle').innerText = currentPicData.display;
        }

        function setupPseudoUI(data) {
            document.getElementById('audio-mode').style.display = 'none';
            document.getElementById('picture-mode').style.display = 'none';
            document.getElementById('pseudo-mode').style.display = 'flex';
            currentPicData = data; 
            document.getElementById('pseudo-word-puzzle').innerText = data.display;
        }

        function createButtons(container, options, correctAnswer) {
            options.forEach(letter => {
                const btn = document.createElement('div');
                btn.className = 'choice-card';
                btn.innerText = letter;
                btn.id = 'btn-' + letter;
                btn.onclick = () => checkAnswer(letter, correctAnswer);
                container.appendChild(btn);
            });
        }

        function playGameSound() {
            const isAudioMode = document.getElementById('audio-mode').style.display !== 'none';
            
            if (isAudioMode) {
                if (!player.src.endsWith(".mp3")) { 
                    player.src = "audio_overview/" + currentTargetSound + ".mp3"; 
                }
                if(player.readyState === 0) player.load();
                player.play().catch(e => {});
            } else {
                // 如果是終極任務，data 內會有 audioFolder 變數；否則按照目前任務編號
                let folderName = currentPicData.audioFolder ? currentPicData.audioFolder : "audio_task" + currentMission;
                player.src = folderName + "/" + currentPicData.word + ".m4a";
                player.play().catch(e => { console.log("Missing audio file: " + player.src); });
            }
        }

        function checkAnswer(choice, correctAnswer) {
            if (!isRoundActive) return;
            const btn = document.getElementById('btn-' + choice);

            if (choice === correctAnswer) {
                isRoundActive = false;
                btn.classList.add('correct-bg');
                ticks++;
                document.getElementById('tick-count').innerText = ticks;

                if (document.getElementById('picture-mode').style.display !== 'none') {
                    const puzzle = document.getElementById('word-puzzle');
                    puzzle.innerText = puzzle.innerText.replace('_', choice);
                } else if (document.getElementById('pseudo-mode').style.display !== 'none') {
                    const puzzle = document.getElementById('pseudo-word-puzzle');
                    puzzle.innerText = puzzle.innerText.replace('_', choice);
                }

                if (currentQuestionNum === nextPraiseThreshold) {
                    showPraise();
                    nextPraiseThreshold = currentQuestionNum + Math.floor(Math.random() * 2) + 3;
                    setTimeout(() => {
                        document.getElementById('praise-overlay').classList.add('hidden');
                        showNextBtn("答對了！");
                    }, 1500);
                } else {
                    showNextBtn("答對了！🎉");
                }
            } else {
                if (currentQuestionNum === 1) q1Wrong = true;
                if (currentQuestionNum === 2) q2Wrong = true;
                btn.classList.add('wrong-shake');
                document.getElementById('feedback').innerText = "再聽一次！";
                setTimeout(() => { btn.classList.remove('wrong-shake'); }, 400);
                setTimeout(playGameSound, 300);
            }
        }

        function showNextBtn(msg) {
            document.getElementById('feedback').innerText = msg;
            document.getElementById('nextBtn').classList.add('show');
        }

        function showPraise() {
            const praises = [
                {t: "做得好！", e: "👍"}, {t: "繼續努力！", e: "🔥"},
                {t: "任務即將達成！", e: "🚀"}, {t: "加油！", e: "💪"}, {t: "欣賞你！", e: "🌟"}
            ];
            const rp = praises[Math.floor(Math.random() * praises.length)];
            document.getElementById('praise-text').innerText = rp.t;
            document.getElementById('praise-emoji').innerText = rp.e;
            document.getElementById('praise-overlay').classList.remove('hidden');
            document.getElementById('feedback').innerText = ""; 
        }

        function finishGame() {
            hideAllScreens();
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = ticks;
            
            const pwdContainer = document.getElementById('dynamic-passwords');
            pwdContainer.innerHTML = ''; 
            const msgTitle = document.getElementById('result-title');
            const msgDesc = document.getElementById('result-desc');
            const successImg = document.getElementById('final-success-img');

            if (currentMission === 8) {
                msgTitle.innerText = "大功告成！";
                msgDesc.innerHTML = `恭喜你，「聲」探任務大功告成！<br><span style="color:#D84315; font-weight:bold;">你已成為出色的小小「聲」探！</span>`;
                // 顯示終極任務圖片
                successImg.src = "task7/littlesoundetective.jpg";
                successImg.style.display = "block";
            } else {
                msgTitle.innerText = "任務完畢！";
                msgDesc.innerHTML = `恭喜你，小「聲」探任務完畢！<br>你已取得密碼。<br><span style="color:#D84315; font-weight:bold;">請將密碼抄寫在工作紙上。</span>`;
                // 隱藏終極任務圖片
                successImg.style.display = "none";
                successImg.src = "";
                
                const pwds = missionPasswords[currentMission] || [];
                pwds.forEach(pwd => {
                    const div = document.createElement('div');
                    div.className = 'password-card';
                    div.innerText = pwd;
                    pwdContainer.appendChild(div);
                });
            }
        }

        // =========================================
        //  iPhone/iPad 全局按鈕動畫修復
        // =========================================
        document.addEventListener('touchstart', function(e) {
            const targetClasses = [
                'btn-primary', 'menu-btn', 'rev-card', 'skip-btn', 
                'back-btn', 'sound-btn-big', 'sound-btn-small', 
                'choice-card', 'training-btn', 'btn-challenge'
            ];
            
            let target = e.target;
            
            while (target && target !== document) {
                const hasClass = targetClasses.some(cls => target.classList.contains(cls));
                if (hasClass && !target.classList.contains('locked')) {
                    target.classList.add('active-anim');
                    setTimeout(() => { target.classList.remove('active-anim'); }, 150);
                    break;
                }
                target = target.parentElement;
            }
        }, {passive: true});
